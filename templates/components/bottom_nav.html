<!-- Mobile Bottom Navigation (Android-style) -->
<div class="flex items-center justify-around py-2 px-4">
    <!-- Dashboard -->
    <a href="{% url 'analytics:dashboard' %}"
       class="flex flex-col items-center py-2 px-3 rounded-xl transition-colors
              {% if request.resolver_match.url_name == 'dashboard' %}text-red-600{% else %}text-gray-500 hover:text-red-600{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/>
        </svg>
        <span class="text-xs mt-1 font-medium">Home</span>
    </a>

    <!-- My Fowl -->
    <a href="{% url 'fowl:list' %}"
       class="flex flex-col items-center py-2 px-3 rounded-xl transition-colors
              {% if 'fowl' in request.resolver_match.app_name and 'bloodline' not in request.resolver_match.url_name %}text-red-600{% else %}text-gray-500 hover:text-red-600{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
        </svg>
        <span class="text-xs mt-1 font-medium">Fowl</span>
    </a>

    <!-- Center Add Button (FAB-style) -->
    <a href="{% url 'fowl:create' %}"
       class="flex items-center justify-center w-14 h-14 -mt-8 gradient-primary rounded-full shadow-lg hover:shadow-xl transition-shadow">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
        </svg>
    </a>

    <!-- Fights -->
    <a href="{% url 'fights:list' %}"
       class="flex flex-col items-center py-2 px-3 rounded-xl transition-colors
              {% if 'fights' in request.resolver_match.app_name %}text-red-600{% else %}text-gray-500 hover:text-red-600{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <span class="text-xs mt-1 font-medium">Fights</span>
    </a>

    <!-- Profile/Logout Menu -->
    <div class="relative" x-data="{ open: false }">
        <button @click="open = !open"
                class="flex flex-col items-center py-2 px-3 rounded-xl transition-colors
                       {% if request.resolver_match.url_name == 'profile' %}text-red-600{% else %}text-gray-500 hover:text-red-600{% endif %}">
            {% if user.profile.avatar %}
                <img src="{{ user.profile.avatar.url }}" alt="Avatar" class="w-6 h-6 rounded-full object-cover">
            {% else %}
                <div class="w-6 h-6 gradient-primary rounded-full flex items-center justify-center">
                    <span class="text-white text-xs font-bold">{{ user.username|first|upper }}</span>
                </div>
            {% endif %}
            <span class="text-xs mt-1 font-medium">Menu</span>
        </button>

        <!-- Mobile Profile Dropdown -->
        <div x-show="open"
             @click.away="open = false"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 transform scale-95"
             x-transition:enter-end="opacity-100 transform scale-100"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 transform scale-100"
             x-transition:leave-end="opacity-0 transform scale-95"
             class="absolute bottom-full right-0 mb-2 w-48 glass-card rounded-xl shadow-lg py-2 z-50">
            <div class="px-4 py-2 border-b border-gray-100">
                <p class="text-sm font-medium text-gray-800">{{ user.profile.display_name }}</p>
                <p class="text-xs text-gray-500">{{ user.email }}</p>
            </div>
            <a href="{% url 'accounts:profile' %}"
               @click="open = false"
               class="flex items-center space-x-2 px-4 py-2 hover:bg-gray-50 text-gray-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span>Profile Settings</span>
            </a>
            <hr class="my-1">
            <a href="{% url 'accounts:logout' %}"
               @click="open = false"
               class="flex items-center space-x-2 px-4 py-2 hover:bg-red-50 text-red-600 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                <span>Sign Out</span>
            </a>
        </div>
    </div>
</div>

<!-- Alpine.js CDN for dropdown functionality -->
<script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
