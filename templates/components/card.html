<!-- Reusable Glassmorphic Card Component -->
<!-- Usage: {% include 'components/card.html' with title="Card Title" %} -->

<div class="glass-card rounded-2xl overflow-hidden card-hover {% if class %}{{ class }}{% endif %}">
    {% if title or header %}
        <div class="px-6 py-4 border-b border-white/20 {% if header_class %}{{ header_class }}{% endif %}">
            {% if title %}
                <h3 class="text-lg font-bold text-gray-800">{{ title }}</h3>
            {% endif %}
            {% if subtitle %}
                <p class="text-sm text-gray-500">{{ subtitle }}</p>
            {% endif %}
            {% block card_header %}{% endblock %}
        </div>
    {% endif %}

    <div class="p-6 {% if body_class %}{{ body_class }}{% endif %}">
        {% block card_body %}
            {{ content }}
        {% endblock %}
    </div>

    {% if footer %}
        <div class="px-6 py-4 border-t border-white/20 bg-white/30 {% if footer_class %}{{ footer_class }}{% endif %}">
            {% block card_footer %}
                {{ footer }}
            {% endblock %}
        </div>
    {% endif %}
</div>
